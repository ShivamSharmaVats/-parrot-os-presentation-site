<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="960" viewBox="0 0 1920 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a121b"/>
      <stop offset="100%" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1ed3b0"/>
      <stop offset="100%" stop-color="#0da8c9"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f36d6d"/>
      <stop offset="100%" stop-color="#f3b16d"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="960" fill="url(#bg)"/>

  <rect x="120" y="120" width="780" height="720" rx="32" fill="#101c2b" stroke="#2a3b53"/>
  <rect x="1020" y="120" width="780" height="720" rx="32" fill="#1d1820" stroke="#423245"/>

  <text x="510" y="230" text-anchor="middle" fill="url(#left)" font-size="76" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Parrot OS</text>
  <text x="1410" y="230" text-anchor="middle" fill="url(#right)" font-size="76" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Kali Linux</text>

  <text x="510" y="330" text-anchor="middle" fill="#dfeaf6" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Privacy-Focused Defaults</text>
  <text x="510" y="400" text-anchor="middle" fill="#dfeaf6" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Balanced Daily + Security Use</text>
  <text x="510" y="470" text-anchor="middle" fill="#dfeaf6" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Lighter Desktop Experience</text>

  <text x="1410" y="330" text-anchor="middle" fill="#f3e7eb" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Pentesting Industry Standard</text>
  <text x="1410" y="400" text-anchor="middle" fill="#f3e7eb" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Large Ecosystem + Training</text>
  <text x="1410" y="470" text-anchor="middle" fill="#f3e7eb" font-size="40" font-family="Space Grotesk, Arial, sans-serif">Strong Red-Team Workflows</text>

  <circle cx="960" cy="480" r="98" fill="#0e1624" stroke="#32465f" stroke-width="4"/>
  <text x="960" y="496" text-anchor="middle" fill="#ffffff" font-size="62" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">VS</text>

  <text x="960" y="805" text-anchor="middle" fill="#9fb4c9" font-size="34" font-family="Space Grotesk, Arial, sans-serif">Choose based on your goal: privacy + daily balance or pentest standardization</text>
</svg>
